name: Android 16 APK Online Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows triggering the build manually inside the browser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Grant Execute Permissions for Gradle
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: VoiceCallBouncer-Pixel10Pro
        path: app/build/outputs/apk/debug/app-debug.apk
